<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 80" fill="none">
  <defs>
    <linearGradient id="mohGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1B6B3A"/>
      <stop offset="100%" style="stop-color:#27AE60"/>
    </linearGradient>
  </defs>
  <!-- Health Cross + Crescent -->
  <g transform="translate(20, 10)">
    <circle cx="25" cy="30" r="24" stroke="url(#mohGrad)" stroke-width="3" fill="none"/>
    <!-- Cross -->
    <rect x="20" y="16" width="10" height="28" rx="2" fill="url(#mohGrad)"/>
    <rect x="11" y="25" width="28" height="10" rx="2" fill="url(#mohGrad)"/>
    <!-- Small crescent -->
    <path d="M38,12 A10,10 0 0,1 38,22 A7,7 0 0,0 38,12" fill="url(#mohGrad)"/>
  </g>
  <!-- Text -->
  <text x="78" y="35" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1B6B3A" text-anchor="start">وزارة الصحة</text>
  <text x="78" y="55" font-family="Arial, sans-serif" font-size="10" fill="#27AE60" text-anchor="start">Ministry of Health</text>
</svg>