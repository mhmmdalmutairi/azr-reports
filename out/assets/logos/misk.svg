<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 80" fill="none">
  <defs>
    <linearGradient id="miskGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6C3483"/>
      <stop offset="100%" style="stop-color:#A569BD"/>
    </linearGradient>
  </defs>
  <!-- Misk Tree Icon -->
  <g transform="translate(20, 5)">
    <!-- Trunk -->
    <rect x="22" y="40" width="6" height="25" rx="2" fill="#6C3483"/>
    <!-- Leaves/Crown -->
    <circle cx="25" cy="28" r="16" fill="url(#miskGrad)" opacity="0.8"/>
    <circle cx="16" cy="22" r="10" fill="url(#miskGrad)" opacity="0.6"/>
    <circle cx="34" cy="22" r="10" fill="url(#miskGrad)" opacity="0.6"/>
    <circle cx="25" cy="16" r="10" fill="url(#miskGrad)" opacity="0.7"/>
  </g>
  <!-- Text -->
  <text x="65" y="32" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#6C3483" text-anchor="start">MISK</text>
  <text x="65" y="52" font-family="Arial, sans-serif" font-size="12" fill="#A569BD" text-anchor="start">مؤسسة مسك</text>
</svg>