      <stop offset="0%" style="stop-color:#148F77"/>
      <stop offset="100%" style="stop-color:#D4A017"/>
    </linearGradient>
    <linearGradient id="azrBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#148F77"/>
      <stop offset="50%" style="stop-color:#1ABC9C"/>
      <stop offset="100%" style="stop-color:#D4A017"/>
    </linearGradient>
  </defs>
  <!-- Logo Mark - Rounded Square -->
  <rect x="2" y="5" width="40" height="40" rx="10" fill="url(#azrBg)"/>
  <!-- AZR Text inside mark -->
  <text x="22" y="31" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="900" fill="white" text-anchor="middle" letter-spacing="1">AZR</text>
  <!-- Brand Name -->
  <text x="52" y="25" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="900" fill="white" text-anchor="start">أزر</text>
  <text x="52" y="42" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="url(#azrGrad)" text-anchor="start" letter-spacing="1">INNOVATION STUDIO</text>
