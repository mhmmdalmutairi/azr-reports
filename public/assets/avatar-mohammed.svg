<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="bgGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#148F77"/>
      <stop offset="100%" style="stop-color:#D4A017"/>
    </linearGradient>
    <linearGradient id="shirtGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A1628"/>
      <stop offset="100%" style="stop-color:#148F77"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <circle cx="100" cy="100" r="100" fill="url(#bgGrad2)"/>
  <!-- Shoulders/Suit -->
  <ellipse cx="100" cy="210" rx="80" ry="60" fill="url(#shirtGrad2)"/>
  <!-- Neck -->
  <rect x="85" y="130" width="30" height="25" rx="5" fill="#C8A882" opacity="0.9"/>
  <!-- Head -->
  <ellipse cx="100" cy="95" rx="40" ry="45" fill="#C8A882" opacity="0.9"/>
  <!-- Hair -->
  <ellipse cx="100" cy="58" rx="38" ry="22" fill="#2C1810"/>
  <rect x="62" y="55" width="10" height="28" rx="5" fill="#2C1810"/>
  <rect x="128" y="55" width="10" height="28" rx="5" fill="#2C1810"/>
  <!-- Eyes -->
  <ellipse cx="85" cy="92" rx="5" ry="4" fill="#2C1810"/>
  <ellipse cx="115" cy="92" rx="5" ry="4" fill="#2C1810"/>
  <!-- Eyebrows -->
  <path d="M77,84 Q85,79 93,83" stroke="#2C1810" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M107,83 Q115,79 123,84" stroke="#2C1810" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Nose -->
  <path d="M100,95 L97,108 Q100,110 103,108 Z" fill="#B8956E" opacity="0.6"/>
  <!-- Smile -->
  <path d="M88,115 Q100,123 112,115" stroke="#A8866B" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Light beard -->
  <path d="M72,108 Q78,138 100,142 Q122,138 128,108" fill="#2C1810" opacity="0.2"/>
  <!-- Suit collar / Thobe style -->
  <path d="M80,155 L100,148 L120,155 L120,175 L80,175 Z" fill="white" opacity="0.95"/>
  <!-- Collar button -->
  <circle cx="100" cy="158" r="2" fill="#D4A017"/>
  <circle cx="100" cy="168" r="2" fill="#D4A017"/>
</svg>