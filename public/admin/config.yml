backend:
  name: github
  repo: mhmmdalmutairi/azr-reports
  branch: main

# Since this is a plain static site with no build step,
# published content goes directly into the public/ folder.
media_folder: "public/assets"
public_folder: "/assets"

collections:
  # ── Blog Posts ──────────────────────────────────────────
  - name: "blog"
    label: "Blog Posts"
    folder: "public/blog"
    create: true
    extension: "html"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Publish Date", name: "date", widget: "datetime" }
      - { label: "Author", name: "author", widget: "string", default: "AZR Team" }
      - label: "Category"
        name: "category"
        widget: "select"
        options:
          - "Innovation"
          - "Technology"
          - "Business Strategy"
          - "Customer Experience"
          - "Digital Transformation"
      - { label: "Body", name: "body", widget: "markdown" }

  # ── Projects / Portfolio ────────────────────────────────
  - name: "projects"
    label: "Projects"
    folder: "public/projects"
    create: true
    extension: "html"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Client", name: "client", widget: "string" }
      - { label: "Description", name: "description", widget: "text" }
      - { label: "Featured Image", name: "image", widget: "image", required: false }

  # ── Site Settings ───────────────────────────────────────
  - name: "settings"
    label: "Site Settings"
    files:
      - label: "General Settings"
        name: "general"
        file: "public/admin/settings.json"
        fields:
          - label: "Company Info"
            name: "company"
            widget: "object"
            fields:
              - { label: "Company Name", name: "name", widget: "string", default: "AZR Innovation Studio" }
              - { label: "Tagline", name: "tagline", widget: "string" }
              - { label: "Description", name: "description", widget: "text" }

          - label: "Contact Details"
            name: "contact"
            widget: "object"
            fields:
              - { label: "Email", name: "email", widget: "string" }
              - { label: "Phone", name: "phone", widget: "string", required: false }
              - { label: "Address", name: "address", widget: "text", required: false }

          - label: "Social Links"
            name: "social"
            widget: "object"
            fields:
              - { label: "Twitter / X", name: "twitter", widget: "string", required: false }
              - { label: "LinkedIn", name: "linkedin", widget: "string", required: false }
              - { label: "GitHub", name: "github", widget: "string", required: false }
              - { label: "Instagram", name: "instagram", widget: "string", required: false }
